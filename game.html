<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monkey Runner</title>
  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: system-ui, sans-serif;
    }

    #page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
    }

    #game-container {
      border: 2px solid #333;
      background: linear-gradient(#87ceeb 60%, #e0cda9 60%);
      position: relative;
    }

    #score, #highscore {
      position: absolute;
      top: 10px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 14px;
      border-radius: 4px;
    }

    #score { left: 10px; }
    #highscore { right: 10px; }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
      display: none;
    }

    #back-link {
      display: block;
      margin-top: 20px;
      font-size: 18px;
      text-decoration: none;
      color: #333;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="page-wrapper">

    <div id="game-container">
      <canvas id="game" width="900" height="300"></canvas>
      <div id="score">Score: 0</div>
      <div id="highscore">High Score: 0</div>
      <div id="message">Press SPACE or ↑ to start and jump</div>
    </div>

    <a id="back-link" href="fromScratch.html">
      ← Back to Italian Food Page
    </a>

  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highscore");
    const messageEl = document.getElementById("message");

    const groundY = 240;
    let lastTime = 0;
    let gameSpeed = 300;
    let gravity = 1500;
    let isRunning = false;
    let score = 0;

    let highScore = Number(localStorage.getItem("monkeyHighScore")) || 0;
    highScoreEl.textContent = "High Score: " + highScore;

    // Monkey
    const monkey = {
      x: 80,
      y: groundY - 55,
      width: 55,
      height: 55,
      vy: 0,
      onGround: true
    };

    // Bananas
    const bananas = [];
    let bananaTimer = 0;
    let bananaInterval = 1.2;

    // Obstacles
    const obstacles = [];
    let obstacleTimer = 0;
    let obstacleInterval = 1.8;

    function spawnBanana() {
      const y = groundY - (Math.random() * 80 + 20);
      bananas.push({
        x: canvas.width + 20,
        y,
        width: 25,
        height: 25,
        collected: false
      });
    }

    function spawnObstacle() {
      const type = Math.random() < 0.5 ? "crate" : "pipe";

      if (type === "crate") {
        obstacles.push({
          x: canvas.width + 20,
          y: groundY - 35,
          width: 35,
          height: 35,
          type
        });
      } else {
        const minHeight = 40;
        const maxHeight = 90;
        const height = Math.random() * (maxHeight - minHeight) + minHeight;

        obstacles.push({
          x: canvas.width + 20,
          y: groundY - height,
          width: 40,
          height,
          type
        });
      }
    }

    function resetGame() {
      score = 0;
      gameSpeed = 300;
      bananas.length = 0;
      obstacles.length = 0;
      monkey.y = groundY - monkey.height;
      monkey.vy = 0;
      monkey.onGround = true;
      bananaTimer = 0;
      obstacleTimer = 0;
      scoreEl.textContent = "Score: 0";
    }

    function startGame() {
      if (!isRunning) {
        resetGame();
        isRunning = true;
        messageEl.style.display = "none";
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }
    }

    function endGame() {
      isRunning = false;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("monkeyHighScore", highScore);
        highScoreEl.textContent = "High Score: " + highScore;
      }

      messageEl.textContent = "Game Over! Press SPACE or ↑ to restart";
      messageEl.style.display = "block";
    }

    function jump() {
      if (monkey.onGround) {
        monkey.vy = -600;
        monkey.onGround = false;
      }
    }

    function update(dt) {
      // Progressive speed increase
      gameSpeed += dt * 20;

      monkey.vy += gravity * dt;
      monkey.y += monkey.vy * dt;

      if (monkey.y + monkey.height >= groundY) {
        monkey.y = groundY - monkey.height;
        monkey.vy = 0;
        monkey.onGround = true;
      }

      bananaTimer += dt;
      if (bananaTimer >= bananaInterval) {
        bananaTimer = 0;
        spawnBanana();
      }

      bananas.forEach((b, i) => {
        b.x -= gameSpeed * dt;

        if (!b.collected && isColliding(monkey, b)) {
          b.collected = true;
          score++;
          scoreEl.textContent = "Score: " + score;
        }

        if (b.x + b.width < 0) bananas.splice(i, 1);
      });

      obstacleTimer += dt;
      if (obstacleTimer >= obstacleInterval) {
        obstacleTimer = 0;
        spawnObstacle();
      }

      obstacles.forEach((o, i) => {
        o.x -= gameSpeed * dt;

        if (isColliding(monkey, o)) {
          endGame();
        }

        if (o.x + o.width < 0) obstacles.splice(i, 1);
      });
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    // DRAWING FUNCTIONS -----------------------------------------------------

    function drawGround() {
      ctx.strokeStyle = "#654321";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();
    }

    // 🐒 Clean vector monkey, leaning forward
    function drawMonkey() {
      const m = monkey;

      // Tail
      ctx.strokeStyle = "#8b4513";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(m.x - 10, m.y + 35, 25, Math.PI * 0.2, Math.PI * 1.4);
      ctx.stroke();

      // Body (leaning forward)
      ctx.fillStyle = "#8b4513";
      ctx.beginPath();
      ctx.ellipse(m.x + 30, m.y + 35, 22, 30, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.ellipse(m.x + 45, m.y + 20, 18, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      // Face mask
      ctx.fillStyle = "#f4d19b";
      ctx.beginPath();
      ctx.ellipse(m.x + 45, m.y + 25, 14, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.fillStyle = "#8b4513";
      ctx.beginPath();
      ctx.arc(m.x + 28, m.y + 18, 8, 0, Math.PI * 2);
      ctx.arc(m.x + 62, m.y + 18, 8, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(m.x + 40, m.y + 20, 3, 0, Math.PI * 2);
      ctx.arc(m.x + 50, m.y + 20, 3, 0, Math.PI * 2);
      ctx.fill();

      // Arms (one forward, one back)
      ctx.strokeStyle = "#8b4513";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(m.x + 20, m.y + 35);
      ctx.lineTo(m.x + 5, m.y + 45);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(m.x + 40, m.y + 40);
      ctx.lineTo(m.x + 55, m.y + 50);
      ctx.stroke();

      // Legs (running pose)
      ctx.beginPath();
      ctx.moveTo(m.x + 25, m.y + 60);
      ctx.lineTo(m.x + 10, m.y + 75);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(m.x + 35, m.y + 60);
      ctx.lineTo(m.x + 50, m.y + 75);
      ctx.stroke();
    }

    // 🍌 Vector bananas
    function drawBananas() {
      bananas.forEach(b => {
        if (b.collected) return;

        ctx.strokeStyle = "#ccaa00";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 12, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();

        ctx.strokeStyle = "#ffd700";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 12, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();
      });
    }

    // 🧱 Draw crates + pipes
    function drawObstacles() {
      obstacles.forEach(o => {
        if (o.type === "crate") {
          ctx.fillStyle = "#8b5a2b";
          ctx.fillRect(o.x, o.y, o.width, o.height);
        } else {
          ctx.fillStyle = "#228b22";
          ctx.fillRect(o.x, o.y, o.width, o.height);
        }
      });
    }

    // MAIN LOOP -------------------------------------------------------------

    function loop(timestamp) {
      if (!isRunning) return;

      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      update(dt);
      drawGround();
      drawMonkey();
      drawBananas();
      drawObstacles();

      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        if (!isRunning) startGame();
        else jump();
      }
    });

    messageEl.style.display = "block";
  </script>
</body>
</html>
